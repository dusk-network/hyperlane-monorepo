name: Dusk Proposal Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  proposal-validation:
    name: Dusk proposal validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout proposed tree
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Lint GitHub Actions workflows
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo:ro" \
            -w /repo \
            rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 \
            -color \
            .github/workflows/dusk-agent-gate.yml \
            .github/workflows/dusk-proposal-validation.yml \
            .github/workflows/dusk-review-policy-gate.yml

      - name: Check proposed diff
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          git diff --check "$BASE_SHA...HEAD"
          if [ -n "$(git ls-files --others --exclude-standard)" ]; then
            git ls-files --others --exclude-standard
            echo "::error::untracked source paths found"
            exit 1
          fi

      - name: Verify Dusk integration boundary
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags https://github.com/hyperlane-xyz/hyperlane-monorepo.git main
          upstream_head="$(git rev-parse FETCH_HEAD)"
          unexpected=0
          while IFS= read -r path; do
            case "$path" in
              .github/workflows/dusk-agent-gate.yml|\
              .github/workflows/dusk-proposal-validation.yml|\
              .github/workflows/dusk-review-policy-gate.yml|\
              .github/workflows/monorepo-docker.yml|\
              .github/workflows/rebalancer-e2e-test.yml|\
              .github/workflows/rebalancer-sim-test.yml|\
              .github/workflows/rust-docker.yml|\
              .github/workflows/rust.yml|\
              .github/workflows/test.yml|\
              docs/dusk-ci-bootstrap-decisions.md|\
              docs/dusk-companion-compatibility.md|\
              docs/dusk-final-red-team-decisions-2026-07-21.md|\
              docs/dusk-upstream-compatibility-review.md|\
              docs/dusk-upstream-pr-plan.md|\
              rust/main/Cargo.lock|\
              rust/main/Cargo.toml|\
              rust/main/agents/relayer/src/relayer/destination.rs|\
              rust/main/agents/validator/src/main.rs|\
              rust/main/agents/validator/src/reorg_reporter.rs|\
              rust/main/agents/validator/src/reorg_tombstone.rs|\
              rust/main/agents/validator/src/settings.rs|\
              rust/main/agents/validator/src/submit.rs|\
              rust/main/agents/validator/src/submit/tests.rs|\
              rust/main/agents/validator/src/validator.rs|\
              rust/main/chains/hyperlane-dusk/*|\
              rust/main/hyperlane-base/Cargo.toml|\
              rust/main/hyperlane-base/src/contract_sync/cursors/mod.rs|\
              rust/main/hyperlane-base/src/settings/chains.rs|\
              rust/main/hyperlane-base/src/settings/checkpoint_syncer.rs|\
              rust/main/hyperlane-base/src/settings/parser/connection_parser.rs|\
              rust/main/hyperlane-base/src/settings/parser/mod.rs|\
              rust/main/hyperlane-base/src/settings/signers.rs|\
              rust/main/hyperlane-base/src/types/local_storage.rs|\
              rust/main/hyperlane-core/src/chain.rs|\
              rust/main/lander/src/adapter/chains/factory.rs)
                ;;
              *)
                echo "::error file=$path::change falls outside the reviewed Dusk integration boundary"
                unexpected=1
                ;;
            esac
          done < <(git diff --name-only "$upstream_head...HEAD")
          exit "$unexpected"
