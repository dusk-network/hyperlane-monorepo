name: Dusk Hyperlane Agent Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dusk_ref:
        description: "dusk-network/hyperlane-dusk ref to checkout for shared types"
        required: true
        default: "726040440c904ec6adf6616a1963146ee9693fe4"

permissions:
  contents: read

jobs:
  dusk-agent-check:
    name: Dusk agent validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
      GH_TOKEN: ${{ secrets.DUSK_ORG_READ_TOKEN || github.token }}
      DUSK_ORG_READ_TOKEN_CONFIGURED: ${{ secrets.DUSK_ORG_READ_TOKEN != '' }}
      DUSK_REF: ${{ inputs.dusk_ref || '726040440c904ec6adf6616a1963146ee9693fe4' }}
      MONOREPO_DIR: ${{ github.workspace }}/hyperlane/hyperlane-monorepo
      DUSK_DIR: ${{ github.workspace }}/hyperlane/dusk

    steps:
      - name: Checkout Hyperlane monorepo
        uses: actions/checkout@v6
        with:
          path: hyperlane/hyperlane-monorepo
          persist-credentials: false

      - name: Scan Dusk agent runtime placeholders
        working-directory: ${{ env.MONOREPO_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          if git grep -n -E 'todo!|unimplemented!|panic!|expect\(' -- rust/main/chains/hyperlane-dusk/src; then
            echo "::error::Dusk agent runtime panic/placeholder path found"
            exit 1
          fi

      - name: Verify private Dusk checkout access
        shell: bash
        run: |
          set -euo pipefail
          printf 'dusk_org_read_token_configured=%s\n' "$DUSK_ORG_READ_TOKEN_CONFIGURED"
          if [ "$DUSK_ORG_READ_TOKEN_CONFIGURED" = "true" ]; then
            printf 'dusk_agent_gate_token_source=%s\n' 'DUSK_ORG_READ_TOKEN'
          else
            printf 'dusk_agent_gate_token_source=%s\n' 'github.token'
          fi
          gh api repos/dusk-network/hyperlane-dusk --jq .full_name >/dev/null || {
            if [ "$DUSK_ORG_READ_TOKEN_CONFIGURED" = "true" ]; then
              echo "::error::DUSK_ORG_READ_TOKEN is configured but does not grant read access to dusk-network/hyperlane-dusk for the Dusk agent cargo check"
            else
              echo "::error::DUSK_ORG_READ_TOKEN is not configured or not available to this workflow; the Dusk agent cargo check cannot read dusk-network/hyperlane-dusk"
            fi
            exit 1
          }

      - name: Checkout Dusk Hyperlane shared types
        uses: actions/checkout@v6
        with:
          repository: dusk-network/hyperlane-dusk
          ref: ${{ env.DUSK_REF }}
          path: hyperlane/dusk
          token: ${{ env.GH_TOKEN }}
          persist-credentials: false

      - name: Report resolved check refs
        shell: bash
        run: |
          set -euo pipefail
          printf 'monorepo_ref=%s\n' "$GITHUB_SHA"
          git -C "$MONOREPO_DIR" rev-parse HEAD
          printf 'dusk_ref=%s\n' "$DUSK_REF"
          git -C "$DUSK_DIR" rev-parse HEAD

      - name: Format Dusk-owned Rust packages
        working-directory: ${{ env.MONOREPO_DIR }}/rust/main
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --package hyperlane-dusk --package hyperlane-base -- --check

      - name: Test Dusk agent and parser boundaries
        working-directory: ${{ env.MONOREPO_DIR }}/rust/main
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p hyperlane-dusk
          cargo test -p hyperlane-base dusk_

      - name: Lint Dusk agent
        working-directory: ${{ env.MONOREPO_DIR }}/rust/main
        shell: bash
        run: |
          set -euo pipefail
          cargo clippy -p hyperlane-dusk --all-targets -- -D warnings

      - name: Check affected Rust integration
        working-directory: ${{ env.MONOREPO_DIR }}/rust/main
        shell: bash
        run: |
          set -euo pipefail
          cargo check -p hyperlane-dusk -p hyperlane-base -p validator -p relayer -p scraper -p lander

      - name: Verify lockfile remains stable
        working-directory: ${{ env.MONOREPO_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- rust/main/Cargo.lock
